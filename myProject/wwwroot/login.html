<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍦 Ice Cream  - Login 🍦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF69B4 0%, #FFB6C1 25%, #87CEEB 50%, #98FF98 75%, #FFD700 100%);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            border: 4px solid #FF69B4;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #FF69B4;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 15px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        input[type="text"],
        input[type="password"] {
            padding: 12px;
            border: 2px solid #FFB6D9;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
            background: white;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #FF69B4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
            background: #fff9fc;
        }

        input[type="submit"] {
            margin-top: 25px;
            padding: 14px;
            background: linear-gradient(135deg, #FF69B4, #FF6B9D);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.3);
        }

        input[type="submit"]:hover {
            background: linear-gradient(135deg, #FF1493, #FF69B4);
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.5);
            transform: translateY(-2px);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
            animation: shake 0.5s ease;
        }

        #message.error {
            background-color: #ffcccc;
            color: #cc0000;
            border: 2px solid #ff0000;
            display: block;
        }

        #message.success {
            background-color: #ccffcc;
            color: #00cc00;
            border: 2px solid #00ff00;
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .demo-credentials {
            margin-top: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #FFE4E1, #FFB6D9);
            border-radius: 8px;
            border-left: 4px solid #FF69B4;
            font-size: 0.9em;
            color: #333;
        }

        .demo-credentials h3 {
            color: #FF69B4;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .demo-credentials p {
            margin: 5px 0;
            line-height: 1.6;
        }

        .demo-credentials strong {
            color: #FF1493;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🍦 Login 🍦</h1>
        <form id="loginForm">
            <label for="name">👤 Name:</label>
            <input type="text" id="name" placeholder="Enter your name" required>
            <label for="password">🔐 Password:</label>
            <input type="password" id="password" placeholder="Enter your password" required>
            <input type="submit" value="✨ Login">
        </form>
        <div id="message"></div>

        <div class="demo-credentials">
            <h3>📋 Demo Users:</h3>
            <p><strong>Admin:</strong> admin / admin</p>
            <p><strong>User:</strong> user / user</p>
            <p><strong>Also available:</strong></p>
            <p>sari Rabinovitch / password1 (Admin)</p>
            <p>Tamer Rotan / password2 (User)</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value.trim();
            console.log('Attempting login with:', { name, password });
            try {
                const response = await fetch('/api/User/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, password })
                });
                console.log('Response status:', response.status);
                if (response.ok) {
                    const data = await response.json();
                    console.log('Login successful, token:', data.token);
                    localStorage.setItem('token', data.token);
                    document.getElementById('message').textContent = '✨ Login successful!';
                    document.getElementById('message').className = 'success';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    const errorText = await response.text();
                    console.log('Login failed, error:', errorText);
                    document.getElementById('message').textContent = '❌ Login failed: Invalid credentials';
                    document.getElementById('message').className = 'error';
                }
            } catch (error) {
                console.error('Error during login:', error);
                document.getElementById('message').textContent = '❌ Error: ' + error.message;
                document.getElementById('message').className = 'error';
            }
        });
    </script>
</body>
</html>
