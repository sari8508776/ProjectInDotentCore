<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>🍦 Ice Cream 🍦</title>
    <link rel="stylesheet" href="css/site.css?v=2" />
</head>

<body>
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <div id="greeting"></div>
        <div id="authControls">
            <a id="loginLink" href="login.html" style="margin-right:12px;display:none;">Login</a>
            <a id="logoutLink" href="#" style="display:none;">Logout</a>
        </div>
    </div>
    <h1>🍦 Ice Cream 🍦</h1>
    <h3>➕ Add New Flavor</h3>
    <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
        <label for="add-name">Flavor Name:</label>
        <input type="text" id="add-name" placeholder="e.g., Mint Chocolate Chip" required>
        <label for="add-isVegan">
            <input type="checkbox" id="add-isVegan"> 🌱 Vegan Flavor
        </label>
        <input type="submit" value="🎨 Add Flavor">
    </form>

    <div id="editForm">
        <h3>✏️ Edit Flavor</h3>
        <form action="javascript:void(0);" onsubmit="updateItem()">
            <input type="hidden" id="edit-id">
            <label for="edit-name">Flavor Name:</label>
            <input type="text" id="edit-name" required>
            <label for="edit-isVegan">
                <input type="checkbox" id="edit-isVegan"> 🌱 Vegan Flavor
            </label>
            <input type="submit" value="💾 Save Changes">
            <a onclick="closeInput()" aria-label="Close">&#10006;</a>
        </form>
    </div>

    <p id="counter"></p>

    <table>
        <tr style="text-align: center">
            <th style="text-align: center">🌱 Vegan?</th>
            <th style="text-align: center">Flavor Name</th>
            <th style="text-align: center">Actions</th>

        </tr>
        <tbody id="products"></tbody>
    </table>
    <a id="usersLink" href="html/user.html" style="display:none;">👥 Go to Users</a>
    <script src="js/site.js?v=2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="js/notifications.js?v=1"></script>
    <script type="text/javascript">
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        } else {
            const payload = JSON.parse(atob(localStorage.getItem('token').split('.')[1]));
            if (payload && payload.usertype === 'Admin') {
                document.getElementById('usersLink').style.display = 'inline';
            }

            const username = getUsername();
            const loginLink = document.getElementById('loginLink');
            const logoutLink = document.getElementById('logoutLink');
            if (username) {
                document.getElementById('greeting').textContent = '👋 Welcome, ' + username + '!';
                loginLink.style.display = 'none';
                logoutLink.style.display = 'inline';
            } else {
                loginLink.style.display = 'inline';
                logoutLink.style.display = 'none';
            }

            logoutLink.addEventListener('click', function (e) {
                e.preventDefault();
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            });

            document.addEventListener("DOMContentLoaded", function () {
                if (!localStorage.getItem('token')) {
                    window.location.href = 'login.html';
                    return;
                }
                getItems();
            });
        }
    </script>
</body>

</html>
